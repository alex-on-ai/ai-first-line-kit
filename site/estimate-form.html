<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HighCraft.io - Get an estimate</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e8e8e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: 100%; max-width: 560px; background: #171a23; border: 1px solid #262b38; border-radius: 14px; padding: 36px; }
  h1 { font-size: 24px; margin-bottom: 6px; }
  p.sub { color: #9aa3b2; font-size: 14px; margin-bottom: 26px; }
  label { display: block; font-size: 13px; color: #9aa3b2; margin: 14px 0 6px; }
  input, textarea { width: 100%; background: #0f1117; color: #e8e8e8; border: 1px solid #2c3242; border-radius: 8px; padding: 11px 12px; font-size: 15px; font-family: inherit; }
  input:focus, textarea:focus { outline: none; border-color: #e8552f; }
  textarea { min-height: 130px; resize: vertical; }
  button { margin-top: 22px; width: 100%; background: #e8552f; color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 16px; font-weight: 600; cursor: pointer; }
  button:hover { background: #d64a26; }
  .ok { display: none; margin-top: 18px; padding: 12px; border: 1px solid #2e7d32; border-radius: 8px; color: #81c784; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
  <h1>Tell us the shape of the problem</h1>
  <p class="sub">We reply within one business day. No newsletters, no spam.</p>
  <form id="f">
    <label for="name">Name</label>
    <input id="name" name="name" required>
    <label for="company">Company</label>
    <input id="company" name="company">
    <label for="email">Work email</label>
    <input id="email" name="email" type="email" required>
    <label for="message">What are you trying to build or fix?</label>
    <textarea id="message" name="message" required></textarea>
    <button type="submit">Request an estimate</button>
    <div class="ok" id="ok">Thanks - your request is in. We will get back to you within one business day.</div>
  </form>
</div>
<script>
const fills = {
  a: {
    name: 'Dr. Andrew Cole',
    company: 'Vitamed Clinics',
    email: 'a.cole@vitamedclinics.example',
    message: 'We run a network of 3 diagnostic and functional medicine clinics in Austin, TX (~60 staff). Patient requests come via phone, website, texts and Instagram and our 4 front-desk staff cannot keep up: after-hours inquiries get lost, intake forms are half paper, no-show rate is around 20%. Looking for a partner to build AI-assisted request intake and pre-visit patient summaries alongside our practice-management system (MedTrack). Physician-owner here; we would want to start with a small pilot on one clinic.'
  },
  b: {
    name: 'Max',
    company: '',
    email: 'max2007@gmail.example',
    message: 'Hi, I need someone to make me an app like TikTok but for my university, budget is $300, need it in 2 weeks. Can you also do my course project on AI? Urgent.'
  }
};
const fill = fills[new URLSearchParams(location.search).get('fill')];
if (fill) for (const [k, v] of Object.entries(fill)) document.getElementById(k).value = v;
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = new URLSearchParams(new FormData(e.target));
  await fetch('https://YOUR_N8N_HOST/webhook/highcraft-lead-intake', { method: 'POST', body: data, mode: 'no-cors' });
  document.getElementById('ok').style.display = 'block';
  e.target.querySelector('button').disabled = true;
});
</script>
</body>
</html>
